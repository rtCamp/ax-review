# Minimal Workflow - Gemini
# Basic accessibility review using Google Gemini
# Best for: Getting started quickly with default settings

name: Accessibility Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  a11y-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Accessibility Review
        uses: your-org/ax-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-provider: gemini
          api-key: ${{ secrets.GEMINI_API_KEY }}