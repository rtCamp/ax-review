# Self-Hosted Ollama Workflow
# For organizations with their own Ollama infrastructure
# Best for: Private/deployment-specific Ollama servers

name: Accessibility Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  a11y-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Accessibility Review
        uses: your-org/ax-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-provider: ollama
          api-key: ${{ secrets.OLLAMA_API_KEY }}
          model: llama3.2
          # Point to your self-hosted Ollama server
          ollama-url: ${{ secrets.OLLAMA_SERVER_URL }}
          output-mode: checks
          fail-on-issues: true